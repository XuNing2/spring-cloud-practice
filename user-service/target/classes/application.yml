# 用户服务配置文件
server:
  port: 8081  # 服务端口

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/  # 注册到 Eureka Server
  instance:
    prefer-ip-address: true  # 使用 IP 地址注册
    instance-id: ${spring.application.name}:${server.port}  # 实例 ID

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: "*"  # 暴露所有端点
  endpoint:
    health:
      show-details: always  # 显示健康检查详细信息