# Eureka Server 配置文件
server:
  port: 8761  # Eureka Server 端口

spring:
  application:
    name: eureka-server  # 应用名称

eureka:
  instance:
    hostname: localhost  # Eureka 实例主机名
  client:
    register-with-eureka: false  # 不向注册中心注册自己
    fetch-registry: false        # 不需要检索服务
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  
  # Eureka Server 的自我保护机制
  server:
    enable-self-preservation: false  # 关闭自我保护模式（开发环境）
    eviction-interval-timer-in-ms: 4000  # 清理无效节点的时间间隔

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: "*"  # 暴露所有端点
  endpoint:
    health:
      show-details: always  # 显示健康检查详细信息