server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true  # 开启服务发现路由
          lower-case-service-id: true  # 服务ID小写
      routes:
        - id: user-service-route
          uri: lb://user-service  # 使用负载均衡访问 user-service
          predicates:
            - Path=/api/users/**, /user-service/**
          filters:
            - StripPrefix=1  # 去掉前缀，例如 /api/users/1 -> /users/1
        - id: default-route
          uri: lb://user-service
          predicates:
            - Path=/users/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
